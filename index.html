<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>성경읽기 계획표</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans KR',sans-serif;background:#0a0702}
.screen{position:fixed;inset:0;display:none;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* 표지 */
#s-cover{background:radial-gradient(ellipse at 40% 30%,#3d2510 0%,#1a0e05 100%);overflow-y:auto;align-items:center}
#s-cover::-webkit-scrollbar{width:4px}
#s-cover::-webkit-scrollbar-thumb{background:#c9a84c;border-radius:6px}
.cover-wrap{width:100%;max-width:480px;margin:0 auto;padding:24px 20px 40px;display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;position:relative;z-index:1}
.cover-title{font-family:'Noto Serif KR',serif;font-size:1.55rem;font-weight:900;color:#e8c97a;letter-spacing:.04em;text-shadow:0 2px 12px rgba(201,168,76,.3)}
.cover-subtitle{font-size:.75rem;color:#a07850;letter-spacing:.06em}

/* 계획 선택 */
.plan-select-row{display:flex;gap:10px;width:100%}
.plan-sel-btn{
  flex:1;padding:12px 8px;border-radius:14px;
  border:2px solid rgba(201,168,76,.3);background:rgba(255,255,255,.05);
  color:rgba(245,232,200,.65);font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;transition:all .25s;font-weight:700;line-height:1.5;text-align:center;
}
.plan-sel-btn.on{
  background:linear-gradient(135deg,rgba(201,168,76,.3),rgba(201,168,76,.12));
  border-color:#c9a84c;color:#e8c97a;
  box-shadow:0 0 16px rgba(201,168,76,.25);
}
.plan-sel-icon{font-size:1.3rem;display:block;margin-bottom:3px}
.plan-sel-name{font-size:.72rem;color:rgba(201,168,76,.6);font-weight:500;display:block}

.input-card{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.25);border-radius:18px;padding:18px 16px;display:flex;flex-direction:column;gap:13px;align-items:flex-start;text-align:left}
.input-label{font-size:.65rem;color:#c9a84c;font-weight:700;letter-spacing:.1em;display:block;margin-bottom:4px}
.input-field{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid rgba(201,168,76,.3);background:rgba(255,255,255,.08);color:#f5e8c8;font-size:.92rem;outline:none;transition:border .2s;font-family:'Noto Serif KR',serif}
.input-field::placeholder{color:rgba(255,255,255,.25);font-family:'Noto Sans KR',sans-serif}
.input-field:focus{border-color:#c9a84c}
.input-field[type=date]{color-scheme:dark}
.date-row{display:flex;gap:8px;align-items:center;width:100%}
.date-input{flex:1}
.reset-btn{padding:9px 14px;border-radius:10px;border:1.5px solid rgba(201,100,80,.5);background:rgba(180,60,40,.15);color:#f0a090;font-size:.72rem;font-weight:700;cursor:pointer;white-space:nowrap}
.end-badge{font-size:.72rem;color:rgba(201,168,76,.6);font-style:italic;margin-top:2px}
.today-row{display:flex;align-items:center;gap:10px;background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:9px 13px;margin-top:4px;width:100%;text-align:left}
.today-label{font-size:.6rem;color:#c9a84c;font-weight:700;letter-spacing:.1em}
.today-val{font-size:.9rem;color:#f5e8c8;font-family:'Noto Serif KR',serif;font-weight:600}
.start-btn{width:100%;padding:15px;border-radius:50px;border:none;cursor:pointer;background:linear-gradient(135deg,#c9a84c,#a07020,#c9a84c);background-size:200%;color:#fff;font-size:1.05rem;font-weight:700;font-family:'Noto Serif KR',serif;letter-spacing:.08em;box-shadow:0 4px 20px rgba(201,168,76,.4);transition:all .3s;position:relative;z-index:2}
.start-btn:hover{transform:translateY(-2px)}
.cover-photo{width:92%;max-width:400px;border-radius:14px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.4);position:relative;z-index:0;pointer-events:none}
.cover-photo img{width:100%;height:auto;display:block;opacity:.88;filter:brightness(1.15)}

/* 목록 */
#s-list{background:#160e04}
.list-header{background:linear-gradient(135deg,#221508,#3a2510,#221508);border-bottom:2px solid #c9a84c;padding:11px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-cross{font-size:20px;color:#c9a84c}
.hdr-info{flex:1;min-width:0}
.hdr-info h1{font-family:'Noto Serif KR',serif;font-size:.95rem;color:#e8c97a;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-info p{font-size:.6rem;color:#8b5e2a;margin-top:1px}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.prog-label{font-size:.6rem;color:#c9a84c;font-weight:600}
.prog-bar{width:100px;height:5px;background:rgba(255,255,255,.12);border-radius:8px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#c9a84c,#e8c97a);border-radius:8px;transition:width .6s}
.hdr-btn-row{display:flex;gap:5px}
.hdr-btn{font-size:.62rem;color:#c9a84c;cursor:pointer;border:1px solid rgba(201,168,76,.4);border-radius:12px;padding:3px 8px;background:transparent;white-space:nowrap}
.list-filter{padding:7px 13px;background:#f7eed6;border-bottom:1px solid #eedcb0;display:flex;gap:6px;align-items:center;flex-shrink:0}
.list-filter span{font-size:.65rem;color:#6b4d28;font-weight:600}
.f-btn{padding:4px 11px;border-radius:20px;border:1px solid #c9a84c;background:#fff;color:#5c3d1e;font-size:.65rem;cursor:pointer;transition:all .18s;font-weight:500}
.f-btn.on,.f-btn:hover{background:#c9a84c;color:#fff}
.plan-list{flex:1;overflow-y:auto;background:#fdf8ee}
.plan-list::-webkit-scrollbar{width:4px}
.plan-list::-webkit-scrollbar-thumb{background:#c9a84c44}
.plan-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid #e8d9a8;cursor:pointer;transition:background .15s}
.plan-item:hover{background:#f2e5c0}
.plan-item.today{background:linear-gradient(90deg,rgba(201,168,76,.18),transparent);border-left:3px solid #c9a84c}
.item-date{display:flex;flex-direction:column;align-items:center;justify-content:center;width:38px;height:38px;border-radius:10px;background:#f7eed6;border:1.5px solid #c9a84c;flex-shrink:0}
.plan-item.done .item-date{background:#dff0e8;border-color:#3a7050}
.plan-item.today .item-date{background:#c9a84c;border-color:#c9a84c}
.item-date .m{font-size:.52rem;color:#a07850;font-weight:600;line-height:1}
.item-date .d{font-size:.88rem;color:#5c3d1e;font-weight:700;line-height:1.2;font-family:'Noto Serif KR',serif}
.plan-item.done .item-date .m,.plan-item.done .item-date .d{color:#3a7050}
.plan-item.today .item-date .m,.plan-item.today .item-date .d{color:#fff}
.today-badge{font-size:.5rem;color:#c9a84c;font-weight:700}
.plan-item.today .today-badge{color:#fff}
.item-info{flex:1;min-width:0}
.item-range{font-size:.78rem;color:#1a0f04;line-height:1.35;font-weight:500}
.item-daynum{font-size:.6rem;color:#a07850;margin-top:2px}
.item-done-mark{font-size:.68rem;color:#3a7050;font-weight:700;flex-shrink:0}
.item-arrow{font-size:11px;color:#a07850;flex-shrink:0}

/* 읽기 */
#s-read{background:#f0ede6}
.read-hdr{background:linear-gradient(180deg,#ece9e0,#f0ede6);border-bottom:1.5px solid #eedcb0;padding:6px 10px 4px;flex-shrink:0}
.read-hdr-row1{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.read-hdr-left{display:flex;gap:5px;flex-shrink:0}
.read-hdr-center{flex:1;text-align:center;min-width:0;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
.read-hdr-center .day-tag{font-size:.6rem;color:#6b4d28;font-weight:700;width:100%;text-align:center}
.read-hdr-center h2{font-family:'Noto Serif KR',serif;font-size:.92rem;color:#221508;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;text-align:center}
.read-hdr-row2{display:flex;align-items:center;gap:6px;padding-top:1px;margin-top:-2px}
.nav-btn{padding:5px 10px;border-radius:16px;border:1.5px solid #c9a84c;background:#fff;color:#5c3d1e;font-size:.67rem;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap}
.nav-btn:hover{background:#f5e9c8}
.font-btn{padding:3px 10px;border-radius:14px;border:1.5px solid #c9a84c;background:#fff;color:#5c3d1e;font-size:.7rem;font-weight:700;cursor:pointer}
.font-label{font-size:.65rem;color:#a07850;font-weight:600}
.done-btn{width:52px;min-height:46px;padding:6px 4px;border-radius:10px;border:none;cursor:pointer;font-size:.72rem;font-weight:700;line-height:1.4;text-align:center;font-family:'Noto Sans KR',sans-serif;flex-shrink:0;transition:all .2s}
.done-btn.unread{background:linear-gradient(160deg,#3a7050,#225038);color:#fff;box-shadow:0 3px 10px rgba(58,112,80,.4)}
.done-btn.already{background:linear-gradient(160deg,#8b5e2a,#5c3d1e);color:#f5e8c8}
.bible-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.bible-frame{width:calc(100% + 18px);border:none;flex:1;min-height:0}

/* 축하 */
#s-celebrate{background:radial-gradient(ellipse at 50% 20%,#2e1c0a 0%,#140b04 100%);overflow-y:auto;align-items:center}
.cel-wrap{width:100%;max-width:520px;margin:0 auto;padding:20px 22px 50px;display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center}
.cel-title{font-family:'Noto Serif KR',serif;font-size:1.5rem;font-weight:900;color:#fff;line-height:1.3;text-shadow:0 2px 0 #000,0 4px 8px rgba(0,0,0,.8)}
.stars-row{display:flex;gap:8px;justify-content:center;font-size:1.2rem}
.info-card{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(201,168,76,.3);border-radius:18px;padding:20px}
.info-row{padding:8px 0;border-bottom:1px solid rgba(201,168,76,.15);text-align:center}
.info-row:last-child{border-bottom:none;padding-bottom:0}
.info-row:first-child{padding-top:0}
.info-date{font-size:1.02rem;color:rgba(245,232,200,.7)}
.info-range{font-size:1.2rem;color:#e8c97a;font-weight:700;font-family:'Noto Serif KR',serif}
.info-reader{font-size:1.26rem;color:#fff;font-weight:800}
.info-prog{font-size:.9rem;color:#f5e8c8;font-weight:600}
.capture-btn{width:100%;padding:11px;border-radius:28px;border:1.5px solid rgba(201,168,76,.5);background:rgba(201,168,76,.12);color:#e8c97a;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s}
.cel-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.cel-btn{padding:10px 20px;border-radius:24px;border:1.5px solid rgba(201,168,76,.4);background:rgba(255,255,255,.08);color:rgba(245,232,200,.8);font-size:.82rem;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.cel-btn.next{background:linear-gradient(135deg,#c9a84c,#a07020);color:#fff;border-color:#c9a84c;box-shadow:0 3px 14px rgba(201,168,76,.38)}
</style>
</head>
<body>

<!-- 표지 -->
<div class="screen active" id="s-cover">
  <div class="cover-wrap">
    <div class="cover-title" id="coverTitle">성경읽기 계획표</div>
    <div class="cover-subtitle">생명수 목장</div>
    <div class="plan-select-row">
      <button class="plan-sel-btn on" id="selBtn1" onclick="selectPlan(1,this)">
        <span class="plan-sel-icon">📖</span>
        연대순 읽기
        <span class="plan-sel-name">창세기 → 요한계시록</span>
      </button>
      <button class="plan-sel-btn" id="selBtn2" onclick="selectPlan(2,this)">
        <span class="plan-sel-icon">📅</span>
        1년 통독
        <span class="plan-sel-name">월별 균등 배분</span>
      </button>
    </div>
    <div class="input-card">
      <div style="width:100%">
        <label class="input-label">📖 시작 날짜 (1일차)</label>
        <div class="date-row">
          <input type="date" class="input-field date-input" id="startDateInput" oninput="onStartDateChange()">
          <button class="reset-btn" onclick="resetChecks()">초기화</button>
        </div>
        <div class="end-badge" id="endDateBadge">종료 예정일: —</div>
        <div class="today-row">
          <div>
            <div class="today-label">📅 오늘 날짜</div>
            <div class="today-val" id="todayDisplay">—</div>
          </div>
        </div>
      </div>
      <div style="width:100%">
        <label class="input-label">🙏 읽는이</label>
        <input type="text" class="input-field" id="readerInput" placeholder="이름을 입력하세요" maxlength="20">
      </div>
    </div>

// 계획별 독립 저장소 키
const SK = {1:'bible_plan1', 2:'bible_plan2'};
let curPlan = 1;
let ST = {checks:{},reader:'',startDate:'',filter:'all'};
let PLAN = PLAN_DATA[1];
let curN = 0, fontIdx = 1;
const FONT_LABELS = ['소','기본','중','대','특대'];
const GODPIA_ZOOM = [0.60,0.72,0.85,1.0,1.35];
const OFFSET = 225;

function saveST(){ try{localStorage.setItem(SK[curPlan],JSON.stringify(ST));}catch(e){} }
function loadST(plan){
  try{
    const s=localStorage.getItem(SK[plan]);
    const def={checks:{},reader:'',startDate:'',filter:'all'};
    return s ? Object.assign(def,JSON.parse(s)) : def;
  }catch(e){ return {checks:{},reader:'',startDate:'',filter:'all'}; }
}

function selectPlan(n, btn){
  curPlan = n;
  PLAN = PLAN_DATA[n];
  ST = loadST(n);
  document.querySelectorAll('.plan-sel-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('startDateInput').value = ST.startDate || '';
  document.getElementById('readerInput').value    = ST.reader    || '';
  updateEndDate();
}

function today(){ return new Date(); }
function parseDate(s){ if(!s) return null; const[y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function fmtKo(d){ return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+WEEKDAYS[d.getDay()]+')'; }
function nthDate(start,n){ const d=parseDate(start); if(!d) return null; d.setDate(d.getDate()+n); return d; }
function todayIdx(start){
  const s=parseDate(start); if(!s) return 0;
  const t=today();
  const diff=Math.floor((new Date(t.getFullYear(),t.getMonth(),t.getDate())-new Date(s.getFullYear(),s.getMonth(),s.getDate()))/(864e5));
  return Math.max(0,Math.min(diff,364));
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='s-cover') initCover();
  if(id==='s-list')  renderList();
}

function initCover(){
  document.getElementById('todayDisplay').textContent = fmtKo(today());
  document.getElementById('startDateInput').value = ST.startDate || '';
  document.getElementById('readerInput').value    = ST.reader    || '';
  document.querySelectorAll('.plan-sel-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('selBtn'+curPlan).classList.add('on');
  updateEndDate();
}
function onStartDateChange(){ updateEndDate(); }
function updateEndDate(){
  const s=document.getElementById('startDateInput').value;
  if(!s){ document.getElementById('endDateBadge').textContent='종료 예정일: —'; return; }
  const e=parseDate(s); e.setDate(e.getDate()+364);
  document.getElementById('endDateBadge').textContent='종료 예정일: '+(e.getMonth()+1)+'월 '+e.getDate()+'일 ('+e.getFullYear()+')';
}
function resetChecks(){
  if(!confirm('이 계획의 읽음 기록을 모두 초기화할까요?')) return;
  ST.checks={}; PLAN.forEach(p=>ST.checks[p.n]=false);
  saveST(); alert('초기화 완료');
}
function startReading(){
  try{
    const sd=document.getElementById('startDateInput').value;
    const rd=document.getElementById('readerInput').value.trim();
    if(!sd){ alert('시작 날짜를 입력해주세요.'); return; }
    if(sd!==ST.startDate){ ST.checks={}; PLAN.forEach(p=>ST.checks[p.n]=false); }
    ST.startDate=sd; ST.reader=rd; saveST();
    const idx=todayIdx(sd);
    const item=PLAN[Math.min(idx,PLAN.length-1)];
    renderList(); openItem(item.n);
  }catch(err){ alert('오류: '+err.message); }
}

function setFilter(f,btn){
  ST.filter=f; saveST();
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); renderList();
}
function renderList(){
  const tidx=ST.startDate?todayIdx(ST.startDate):0;
  const todayN=PLAN[Math.min(tidx,PLAN.length-1)].n;
  const planName=curPlan===1?'연대순 읽기':'1년 통독';
  document.getElementById('listTitle').textContent=planName;
  document.getElementById('listSubtitle').textContent=ST.reader?'읽는이: '+ST.reader:'생명수 목장';
  const items=PLAN.filter(p=>ST.filter==='done'?ST.checks[p.n]:ST.filter==='unread'?!ST.checks[p.n]:true);
  document.getElementById('planList').innerHTML=items.map(p=>{
    const d=nthDate(ST.startDate,p.n-1);
    const isToday=p.n===todayN;
    let dateHtml='<div class="d">'+p.n+'</div>';
    if(d){
      dateHtml='<div class="m">'+(d.getMonth()+1)+'월</div><div class="d">'+d.getDate()+'</div>';
      if(isToday) dateHtml+='<div class="today-badge">TODAY</div>';
    }
    const doneHtml=ST.checks[p.n]?'<div class="item-done-mark">✓ 읽음</div>':'<div class="item-arrow">›</div>';
    return '<div class="plan-item'+(ST.checks[p.n]?' done':'')+(isToday?' today':'')+'" onclick="openItem('+p.n+')">'
      +'<div class="item-date">'+dateHtml+'</div>'
      +'<div class="item-info"><div class="item-range">'+p.r+'</div><div class="item-daynum">제 '+p.n+'일차</div></div>'
      +doneHtml+'</div>';
  }).join('');
  updateProg();
  setTimeout(()=>{const el=document.querySelector('.plan-item.today');if(el)el.scrollIntoView({block:'center',behavior:'smooth'});},80);
}
function updateProg(){
  const done=PLAN.filter(p=>ST.checks[p.n]).length;
  const pct=Math.round(done/PLAN.length*100);
  document.getElementById('progLabel').textContent=done+' / '+PLAN.length;
  document.getElementById('progFill').style.width=pct+'%';
}

function openItem(n){
  curN=n;
  const p=PLAN.find(x=>x.n===n); if(!p) return;
  const d=nthDate(ST.startDate,p.n-1);
  let tag=d?(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+WEEKDAYS[d.getDay()]+') · 제'+p.n+'일':'제 '+p.n+'일';
  document.getElementById('dayTag').textContent=tag;
  document.getElementById('readTitle').textContent=p.r;
  updateDoneBtn(); showScreen('s-read'); loadBible(p);
}
function updateDoneBtn(){
  const done=!!ST.checks[curN];
  document.getElementById('cmpBtn').className='done-btn '+(done?'already':'unread');
  document.getElementById('cmpTxt').innerHTML=done?'이미<br>읽음':'모두<br>읽음';
}

const BOOK_KEYS=Object.keys(BID).sort((a,b)=>b.length-a.length);
const BOOK_RE=new RegExp('(' + BOOK_KEYS.map(k=>k.replace(/[-\/\\^$*+?.()|[\]{}]/g,'\\$&')).join('|') + ')\\s*([\\d][\\d\\-,\\s]*(?:장|편)?)', 'g');
const MAX_CH=[0,50,40,27,36,34,24,21,4,31,24,22,25,29,36,10,13,10,42,150,31,12,8,66,52,5,48,12,14,3,9,1,4,7,3,3,3,2,14,4,28,16,24,41,28,16,16,13,6,6,4,4,5,3,6,4,3,1,13,5,5,3,5,1,1,1,22];
function parseRange(range){
  const out=[],seen=new Set();
  BOOK_RE.lastIndex=0; let m;
  while((m=BOOK_RE.exec(range))!==null){
    const bid=BID[m[1]];if(!bid) continue;
    const nums=m[2].replace(/장|편/g,'').replace(/:\d+/g,'').trim();
    expandNums(nums,MAX_CH[bid]||999).forEach(ch=>{
      const k=bid+':'+ch; if(!seen.has(k)){seen.add(k);out.push({bid,ch});}
    });
  }
  return out;
}
function expandNums(str,max){
  const r=[];
  str.split(',').forEach(p=>{
    p=p.trim();
    const rng=p.match(/^(\d+)\s*-\s*(\d+)$/);
    const one=p.match(/^(\d+)$/);
    if(rng) for(let c=+rng[1];c<=Math.min(+rng[2],max);c++) r.push(c);
    else if(one) r.push(+one[1]);
  });
  return r;
}
function godpiaUrl(bid,ch){
  const vol=GODPIA_VOL[bid]||'gen';
  return 'https://www.godpia.com/read/reading.asp?vol='+vol+'&chap='+ch;
}
function loadBible(p){
  const segs=parseRange(p.r);
  if(!segs.length) return;
  const frame=document.getElementById('bibleFrame');
  const url=godpiaUrl(segs[0].bid,segs[0].ch)+'&_t='+Date.now();
  frame.onload = function(){ onFrameLoad(frame); };
  frame.src=url;
}
function onFrameLoad(frame){
  const zm=GODPIA_ZOOM[fontIdx]||1.0;
  frame.style.zoom=zm;
  const adj=Math.round(OFFSET*zm);
  frame.style.marginTop='-'+adj+'px';
  frame.style.height='calc(100% + '+adj+'px)';
}
function changeFont(dir){
  fontIdx=Math.max(0,Math.min(4,fontIdx+dir));
  document.getElementById('fontLabel').textContent=FONT_LABELS[fontIdx];
  try{localStorage.setItem('bible_fi',fontIdx);}catch(e){}
  onFrameLoad(document.getElementById('bibleFrame'));
}
function markDone(){
  if(!curN) return;
  const was=!!ST.checks[curN];
  ST.checks[curN]=!was; saveST(); updateDoneBtn(); updateProg();
  if(!was) showCelebration(curN);
}
function showCelebration(n){
  const p=PLAN.find(x=>x.n===n); if(!p) return;
  const done=PLAN.filter(x=>ST.checks[x.n]).length;
  const pct=Math.round(done/PLAN.length*100);
  document.getElementById('celDate').textContent=fmtKo(today());
  document.getElementById('celRange').textContent=p.r;
  document.getElementById('celReader').textContent=ST.reader||'—';
  document.getElementById('celProg').textContent=done+'일 / '+PLAN.length+'일 ('+pct+'%) 읽음';
  showScreen('s-celebrate');
}
function goNext(){
  const idx=PLAN.findIndex(x=>x.n===curN);
  const next=PLAN[idx+1];
  if(next) openItem(next.n); else showScreen('s-list');
}
async function doShare(){
  const btn=document.getElementById('captureBtn');
  const celBtns=document.querySelector('.cel-btns');
  const wrap=document.getElementById('celWrap');
  if(!wrap||typeof html2canvas==='undefined') return;
  btn.textContent='준비 중…'; btn.disabled=true;
  celBtns.style.display='none'; btn.style.display='none';
  try{
    const canvas=await html2canvas(wrap,{backgroundColor:'#140b04',scale:2,useCORS:true,logging:false});
    const jc=document.createElement('canvas');
    jc.width=canvas.width;jc.height=canvas.height;
    const ctx=jc.getContext('2d');
    ctx.fillStyle='#140b04';ctx.fillRect(0,0,jc.width,jc.height);
    ctx.drawImage(canvas,0,0);
    const fname='성경읽기_'+new Date().toISOString().slice(0,10)+'.jpg';
    const blob=await new Promise(res=>jc.toBlob(res,'image/jpeg',0.92));
    const file=new File([blob],fname,{type:'image/jpeg'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'오늘 성경읽기 완료',text:'말씀을 읽었습니다 ✝'});
    } else {
      const url=URL.createObjectURL(blob);
      const newTab=window.open(url,'_blank');
      if(newTab){ setTimeout(()=>URL.revokeObjectURL(url),60000); alert('이미지를 길게 누르면 저장/공유할 수 있습니다.'); }
      else { const a=document.createElement('a');a.href=url;a.download=fname;a.click(); setTimeout(()=>URL.revokeObjectURL(url),1000); }
    }
  }catch(e){ if(e.name!=='AbortError') alert('오류: '+e.message); }
  finally{ btn.textContent='📤 공유하기';btn.disabled=false;celBtns.style.display='';btn.style.display=''; }
}

document.addEventListener('DOMContentLoaded',()=>{
  ST = loadST(1);
  try{fontIdx=parseInt(localStorage.getItem('bible_fi')||'1');}catch(e){}
  initCover();
});
